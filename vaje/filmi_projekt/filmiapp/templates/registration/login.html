{% extends "filmiapp/osnova.html" %}

{% block naslov %}Prijava{% endblock %}

{% block sporocilo %}
{{ block.super }}
{% if form.errors %}
<div class="notification is-danger is-light">
    <button class="delete"></button>
    Napačno uporabniško ime ali geslo!
</div>
{% endif %}
{% endblock %}

{% block vsebina %}
<form action="{% url 'login' %}" method="POST">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ next }}">
    <div class="field">
        <label class="label">Uporabniško ime</label>
        <p class="control has-icons-left">
            <input class="input" type="text" name="{{ form.username.html_name }}" placeholder="Uporabniško ime" value="" />
            <span class="icon is-small is-left">
                <i class="fas fa-user"></i>
            </span>
        </p>
    </div>
    <div class="field">
        <label class="label">Geslo</label>
        <p class="control has-icons-left">
            <input class="input" type="password" name="{{ form.password.html_name }}" placeholder="Geslo" />
            <span class="icon is-small is-left">
                <i class="fas fa-lock"></i>
            </span>
        </p>
    </div>
    <div class="field">
        <p class="control">
            <button class="button is-success">
                Prijavi se
            </button>
        </p>
    </div>
</form>
{% endblock %}
