{% extends "filmiapp/osnova.html" %}

{% block naslov %}{{ stevilo }} najboljsih filmov{% endblock %}

{% block vsebina %}
    <h1>{{ stevilo }} najboljsih filmov (po ocenah)</h1>
    <ol>
        {% for id, naslov, ocena in info_najboljsi %}
        <li><a href="{% url 'filmiapp:film_podrobnosti' id %}">{{naslov}}</a>: {{ocena}}</li>
        {% endfor %}
    </ol>
{% endblock %}
